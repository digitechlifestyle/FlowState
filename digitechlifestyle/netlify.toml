[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_SITE_URL = "https://www.digitechlifestyle.com"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/wp-json/*"
  to = "https://digitechlifestyle-com-206789.hostingersite.com/wp-json/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "https://digitechlifestyle-com-206789.hostingersite.com/wp-admin/:splat"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
